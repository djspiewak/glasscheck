name: Build

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cargo_args: --workspace --features appkit
            run_native_smoke: true
          - os: ubuntu-latest
            cargo_args: --workspace --features gtk
            run_native_smoke: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test ${{ matrix.cargo_args }}

      - name: Run AppKit smoke test
        if: ${{ matrix.run_native_smoke }}
        run: cargo test -p glasscheck-appkit --features native-smoke-tests --test appkit_smoke

      - name: Run AppKit contracts test
        if: ${{ matrix.run_native_smoke }}
        run: cargo test -p glasscheck-appkit --features native-contract-tests --test appkit_contracts
