name: Build

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cargo_args: --workspace --features appkit
            run_native_smoke: true
          - os: ubuntu-latest
            cargo_args: --workspace --features gtk
            run_native_smoke: false

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native deps
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libgtk-4-dev xvfb x11-utils

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test ${{ matrix.cargo_args }}

      - name: Run AppKit smoke test
        if: ${{ matrix.run_native_smoke }}
        run: cargo test -p glasscheck-appkit --features native-smoke-tests --test appkit_smoke

      - name: Run AppKit contracts test
        if: ${{ matrix.run_native_smoke }}
        run: cargo test -p glasscheck-appkit --features native-contract-tests --test appkit_contracts

      - name: Run GTK smoke test
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: GDK_BACKEND=x11 xvfb-run -a cargo test -p glasscheck-gtk --features native-smoke-tests --test gtk_smoke

      - name: Run GTK contracts test
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: GDK_BACKEND=x11 xvfb-run -a cargo test -p glasscheck-gtk --features native-contract-tests --test gtk_contracts

      - name: Run shared GTK facade contracts on hidden X11 display
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: GDK_BACKEND=x11 xvfb-run -a cargo test -p glasscheck --features gtk --test facade_contracts_gtk

      - name: Start direct X11 server
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          for display in $(seq 99 110); do
            Xvfb ":${display}" -screen 0 1920x1080x24 > /tmp/glasscheck-xvfb.log 2>&1 &
            for _ in $(seq 1 50); do
              DISPLAY=":${display}" xdpyinfo >/dev/null 2>&1 && {
                echo "DISPLAY=:${display}" >> "$GITHUB_ENV"
                exit 0
              }
              sleep 0.1
            done
            wait $! || true
          done
          cat /tmp/glasscheck-xvfb.log
          exit 1

      - name: Run GTK smoke test on direct X11 display
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: GDK_BACKEND=x11 cargo test -p glasscheck-gtk --features native-smoke-tests --test gtk_smoke

      - name: Run GTK contracts test on direct X11 display
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: GDK_BACKEND=x11 cargo test -p glasscheck-gtk --features native-contract-tests --test gtk_contracts

      - name: Run shared GTK facade contracts on direct X11 display
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: GDK_BACKEND=x11 cargo test -p glasscheck --features gtk --test facade_contracts_gtk
